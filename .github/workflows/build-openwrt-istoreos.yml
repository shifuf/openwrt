name: Build OpenWrt with iStoreOS for JDCloud AX1800 Pro

on:
  workflow_dispatch:
    inputs:
      openwrt_branch:
        description: 'OpenWrt branch or tag (e.g., main, openwrt-23.05, v23.05.3)'
        required: false
        default: 'main'
      enable_istoreos:
        description: 'Enable iStoreOS support'
        required: false
        default: true
        type: boolean

env:
  OPENWRT_BRANCH: ${{ github.event.inputs.openwrt_branch || 'main' }}
  DEVICE_PROFILE: 'jdcloud_re-ss-01'
  TARGET: 'qualcommax'
  SUBTARGET: 'ipq60xx'
  ENABLE_ISTOREOS: ${{ github.event.inputs.enable_istoreos || 'true' }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 480

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        force: true

    - name: Free up disk space
      run: |
        echo "Before cleanup:"
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo apt-get clean
        echo "After cleanup:"
        df -h

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk \
          gcc-multilib g++-multilib gettext git gnutls-dev gperf haveged help2man intltool \
          jq lib32gcc-s1 libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libz-dev lrzsz mkisofs msmtp nano ninja-build \
          p7zip p7zip-full patch pkgconf python2.7 python3 python3-pip python3-ply \
          python3-docutils python3-pyelftools qemu-utils re2c rsync scons squashfs-tools \
          subversion swig texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev

    - name: Clone OpenWrt source
      run: |
        echo "Cloning OpenWrt from branch: ${{ env.OPENWRT_BRANCH }}"
        git clone --depth 1 --branch ${{ env.OPENWRT_BRANCH }} https://github.com/openwrt/openwrt.git openwrt || {
          echo "Failed to clone with branch ${{ env.OPENWRT_BRANCH }}, trying main..."
          git clone --depth 1 https://github.com/openwrt/openwrt.git openwrt
        }

        cd openwrt
        echo "Current OpenWrt version:"
        git describe --tags --always || git log --oneline -1

    - name: Update feeds
      run: |
        cd openwrt

        # Update main feeds
        echo "Updating main feeds..."
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        # Add iStoreOS (kiddin9) feed if enabled
        if [ "${{ env.ENABLE_ISTOREOS }}" = "true" ]; then
          echo "Adding iStoreOS feed..."
          echo "src-git kiddin9 https://github.com/kiddin9/openwrt-packages.git;master" >> feeds.conf.default
        fi

        # Add passwall feed
        echo "Adding PassWall feed..."
        echo "src-git passwall https://github.com/Openwrt-Passwall/openwrt-passwall.git;main" >> feeds.conf.default
        echo "src-git passwall-packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main" >> feeds.conf.default

        # Update all feeds
        echo "Updating all feeds..."
        ./scripts/feeds update -a
        ./scripts/feeds install -a -p kiddin9 || echo "Warning: kiddin9 feed update failed"
        ./scripts/feeds install -a -p passwall || echo "Warning: passwall feed update failed"
        ./scripts/feeds install -a -p passwall-packages || echo "Warning: passwall-packages feed update failed"

    - name: Load custom configuration
      run: |
        cp config/qualcommax_ipq60xx.config openwrt/.config
        cd openwrt

        # Enable iStoreOS packages
        if [ "${{ env.ENABLE_ISTOREOS }}" = "true" ]; then
          echo "Enabling iStoreOS packages..."
          echo "CONFIG_PACKAGE_luci-app-store=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-istorex=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-quickstart=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-quickstart-www=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-ttyd=y" >> .config
        fi

        # Disable problematic Chinese language packs
        echo "# CONFIG_PACKAGE_luci-i18n-base-zh-cn is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-i18n-passwall-zh-cn is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-i18n-istorex-zh-cn is not set" >> .config

        # Generate final configuration
        make defconfig

        # Show configuration summary
        echo "Configuration summary:"
        grep -c "=y" .config
        echo " packages enabled"

    - name: Download packages
      run: |
        cd openwrt
        echo "Downloading package sources..."
        make download -j$(nproc) V=s 2>&1 | tee download.log || true

        # Check for download errors
        if grep -q "ERROR" download.log; then
          echo "Warning: Some downloads failed, continuing anyway..."
        fi

    - name: Build firmware
      run: |
        cd openwrt
        echo "Starting build at $(date)"
        START_TIME=$(date +%s)

        # Build with multiple cores, fallback to single core on error
        make -j$(nproc) V=s 2>&1 | tee build.log || {
          echo "Multi-core build failed, trying single core..."
          make -j1 V=s 2>&1 | tee -a build.log
        }

        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "Build completed in $((DURATION / 60)) minutes"

    - name: Check build results
      run: |
        cd openwrt
        echo "Checking build results..."

        # Check if firmware was built
        if ls bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.bin 2>/dev/null; then
          echo "✓ Firmware built successfully!"
          echo "Built files:"
          ls -lh bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.bin
        else
          echo "✗ Firmware build failed!"
          echo "Check build.log for details"
          exit 1
        fi

    - name: Upload firmware
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-jdcloud-ax1800-pro-istoreos
        path: |
          openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.bin
        retention-days: 90

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          openwrt/build.log
          openwrt/download.log
        retention-days: 30

    - name: Generate release notes
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "## OpenWrt ${{ env.OPENWRT_BRANCH }} for JDCloud AX1800 Pro" > release_notes.md
        echo "" >> release_notes.md
        echo "### Build Information" >> release_notes.md
        echo "- **Target**: qualcommax/ipq60xx" >> release_notes.md
        echo "- **Profile**: jdcloud_re-ss-01" >> release_notes.md
        echo "- **OpenWrt Branch**: ${{ env.OPENWRT_BRANCH }}" >> release_notes.md
        echo "- **iStoreOS**: ${{ env.ENABLE_ISTOREOS }}" >> release_notes.md
        echo "- **Date**: $(date '+%Y-%m-%d %H:%M:%S')" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Included Packages" >> release_notes.md
        echo "- PassWall (proxy tools)" >> release_notes.md
        if [ "${{ env.ENABLE_ISTOREOS }}" = "true" ]; then
          echo "- iStoreOS (app store)" >> release_notes.md
          echo "- iStoreX (extended store)" >> release_notes.md
        fi
        echo "- LuCI web interface" >> release_notes.md
        echo "- NSS network acceleration" >> release_notes.md
        echo "- WiFi 6 (ath11k)" >> release_notes.md
        echo "- Various system utilities" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Software Sources" >> release_notes.md
        echo "- OpenWrt: https://github.com/openwrt/openwrt" >> release_notes.md
        echo "- PassWall: https://github.com/Openwrt-Passwall/openwrt-passwall" >> release_notes.md
        echo "- iStoreOS: https://github.com/kiddin9/openwrt-packages" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Installation" >> release_notes.md
        echo "1. Download the firmware file" >> release_notes.md
        echo "2. Flash via U-Boot" >> release_notes.md
        echo "3. Default IP: 192.168.1.1" >> release_notes.md
        echo "4. Default password: (empty, set on first login)" >> release_notes.md
