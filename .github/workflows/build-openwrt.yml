name: Build Kwrt for JDCloud AX1800 Pro

on:
  workflow_dispatch:
    inputs:
      kwrt_branch:
        description: 'Kwrt branch (for example: 25.12)'
        required: false
        default: '25.12'
      openwrt_branch:
        description: 'OpenWrt branch or tag (for example: openwrt-25.12, v25.12.2 or main)'
        required: false
        default: 'openwrt-25.12'

env:
  KWRT_BRANCH: ${{ github.event.inputs.kwrt_branch || '25.12' }}
  OPENWRT_BRANCH: ${{ github.event.inputs.openwrt_branch || 'openwrt-25.12' }}
  KWRT_TARGET: 'qualcommax_ipq60xx'
  DEVICE_PROFILE: 'jdcloud_re-ss-01'
  TARGET: 'qualcommax'
  SUBTARGET: 'ipq60xx'
  DEFAULT_LAN_IP: '192.168.1.1'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Free up disk space
      run: |
        echo "Before cleanup:"
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo apt-get clean
        echo "After cleanup:"
        df -h

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          aria2 \
          build-essential \
          ccache \
          clang \
          file \
          flex \
          bison \
          g++ \
          gawk \
          gettext \
          git \
          jq \
          libc6-dev-i386 \
          libelf-dev \
          libfuse-dev \
          libgmp3-dev \
          libmpc-dev \
          libncurses5-dev \
          libncurses-dev \
          libssl-dev \
          patch \
          python3 \
          python3-pyelftools \
          python3-setuptools \
          qemu-utils \
          rename \
          rsync \
          subversion \
          swig \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev

    - name: Clone Kwrt and OpenWrt sources
      run: |
        echo "Cloning Kwrt from branch: ${{ env.KWRT_BRANCH }}"
        git clone --depth 1 --branch ${{ env.KWRT_BRANCH }} https://github.com/kiddin9/Kwrt.git kwrt

        for BRANCH in "${{ env.OPENWRT_BRANCH }}" "openwrt-25.12" "main"; do
          echo "Trying OpenWrt source: $BRANCH"
          rm -rf openwrt
          if git clone --depth 1 --branch "$BRANCH" https://github.com/openwrt/openwrt.git openwrt; then
            break
          fi
        done

        if [ ! -d openwrt/.git ]; then
          echo "Failed to clone OpenWrt source."
          exit 1
        fi

        cd openwrt
        echo "Current OpenWrt version:"
        git describe --tags --always || git log --oneline -1
        sudo mkdir -p /mnt/openwrt/build_dir
        sudo chown -R "$USER:$(id -gn)" /mnt/openwrt
        ln -sfn /mnt/openwrt/build_dir build_dir
        touch feeds.log download.log build.log

    - name: Prepare Kwrt source and feeds
      env:
        REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        DEFAULT_LAN_IP: ${{ env.DEFAULT_LAN_IP }}
      run: |
        set -o pipefail
        bash scripts/prepare-kwrt.sh openwrt kwrt config/qualcommax_ipq60xx.config 2>&1 | tee openwrt/feeds.log

    - name: Resolve custom configuration
      run: |
        cd openwrt
        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        set -o pipefail
        echo "Downloading package sources..."
        make download -j$(nproc) 2>&1 | tee download.log || {
          echo "Parallel download step failed, collecting verbose diagnostics..." | tee -a download.log
          make -j1 V=sc tools/flock/compile 2>&1 | tee -a download.log || true
          make -j1 V=sc download 2>&1 | tee -a download.log
        }

    - name: Build firmware
      run: |
        cd openwrt
        set -o pipefail
        echo "Starting build at $(date)"
        START_TIME=$(date +%s)

        make -j$(nproc) V=s 2>&1 | tee build.log || {
          echo "Multi-core build failed, trying single core..."
          make -j1 V=s 2>&1 | tee -a build.log
        }

        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "Build completed in $((DURATION / 60)) minutes"

    - name: Check build results
      run: |
        cd openwrt
        echo "Checking build results..."

        if ls bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.bin 2>/dev/null; then
          echo "Firmware built successfully."
          echo "Built files:"
          ls -lh bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/
        else
          echo "Firmware build failed."
          echo "Check build.log for details."
          exit 1
        fi

    - name: Upload firmware
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: kwrt-jdcloud-ax1800-pro
        path: openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/
        retention-days: 30

    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          openwrt/feeds.log
          openwrt/download.log
          openwrt/build.log
        if-no-files-found: ignore
        retention-days: 30
