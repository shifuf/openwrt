name: Build OpenWrt for JDCloud AX1800 Pro

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version tag (e.g., v25.12.2)'
        required: false
        default: 'v25.12.2'

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || 'v25.12.2' }}
  DEVICE_PROFILE: 'jdcloud_re-ss-01'
  TARGET: 'qualcommax'
  SUBTARGET: 'ipq60xx'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free up disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo apt-get clean
        df -h

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          ccache \
          ecj \
          fastjar \
          file \
          g++ \
          gawk \
          gettext \
          git \
          java-propose-classpath \
          libelf-dev \
          libncurses-dev \
          libssl-dev \
          python3 \
          python3-distutils \
          python3-setuptools \
          rsync \
          subversion \
          swig \
          unzip \
          wget \
          xsltproc \
          zlib1g-dev

    - name: Clone OpenWrt source
      run: |
        git clone https://github.com/openwrt/openwrt.git -b ${{ env.OPENWRT_VERSION }} openwrt
        cd openwrt

        # Update feeds
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        # Add iStoreOS (kiddin9) feed
        echo "src-git kiddin9 https://github.com/kiddin9/openwrt-packages.git;master" >> feeds.conf.default
        ./scripts/feeds update kiddin9
        ./scripts/feeds install -a -p kiddin9

    - name: Load custom configuration
      run: |
        cp config/qualcommax_ipq60xx.config openwrt/.config
        cd openwrt

        # Configure iStoreOS packages
        echo "CONFIG_PACKAGE_luci-app-store=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-istorex=y" >> .config
        echo "CONFIG_PACKAGE_luci-app-quickstart=y" >> .config

        # Disable Chinese language packs if they cause issues
        echo "# CONFIG_PACKAGE_luci-i18n-base-zh-cn is not set" >> .config
        echo "# CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn is not set" >> .config

        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j$(nproc)

    - name: Build firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-jdcloud-ax1800-pro
        path: openwrt/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.bin
        retention-days: 30

    - name: Generate release notes
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "## OpenWrt v25.12.2 for JDCloud AX1800 Pro" > release_notes.md
        echo "" >> release_notes.md
        echo "### Build Information" >> release_notes.md
        echo "- **Target**: qualcommax/ipq60xx" >> release_notes.md
        echo "- **Profile**: jdcloud_re-ss-01" >> release_notes.md
        echo "- **OpenWrt Version**: v25.12.2" >> release_notes.md
        echo "- **Date**: $(date '+%Y-%m-%d %H:%M:%S')" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Included Packages" >> release_notes.md
        echo "- PassWall (proxy tools)" >> release_notes.md
        echo "- iStoreOS (app store)" >> release_notes.md
        echo "- LuCI web interface" >> release_notes.md
        echo "- WiFi 6 (ath11k)" >> release_notes.md
        echo "- NSS network acceleration" >> release_notes.md
        echo "- Various system utilities" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Software Sources" >> release_notes.md
        echo "- OpenWrt: https://github.com/openwrt/openwrt" >> release_notes.md
        echo "- PassWall: https://github.com/Openwrt-Passwall/openwrt-passwall" >> release_notes.md
        echo "- iStoreOS: https://github.com/kiddin9/openwrt-packages" >> release_notes.md
        echo "" >> release_notes.md
        echo "### Installation" >> release_notes.md
        echo "1. Download the firmware file" >> release_notes.md
        echo "2. Flash via U-Boot" >> release_notes.md
        echo "3. Default IP: 192.168.1.1" >> release_notes.md
